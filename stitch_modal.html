<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        /* Modal Animation Styles */
        @keyframes modalEnter {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }
        
        @keyframes backdropEnter {
            from { opacity: 0; backdrop-filter: blur(0px); }
            to { opacity: 1; backdrop-filter: blur(24px); }
        }

        .animate-modal-enter {
            animation: modalEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .animate-backdrop-enter {
            animation: backdropEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        /* Custom Input Styling */
        .glass-input {
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;

            border-color: rgba(255, 106, 43, 0.5);
            box-shadow: 0 0 15px rgba(255, 106, 43, 0.1) inset, 0 0 10px rgba(255, 106, 43, 0.1);

<!-- Simple interaction script for demo purposes -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const closeBtn = document.getElementById('close-modal-btn');
            const backdrop = document.getElementById('modal-backdrop');
            const modal = document.querySelector('[role="dialog"]');

            const closeModal = () => {
                modal.classList.remove('animate-modal-enter');
                backdrop.classList.remove('animate-backdrop-enter');
                modal.style.opacity = '0';
                modal.style.transform = 'scale(0.95) translateY(10px)';
                backdrop.style.opacity = '0';
                
                setTimeout(() => {
                    modal.parentElement.style.display = 'none';
                }, 300);
            };

            closeBtn.addEventListener('click', closeModal);
            backdrop.addEventListener('click', closeModal);

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
            });
        });
    </script>
